<!DOCTYPE html>
<html lang="th">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    <title>Content Planner</title>
    <link rel="stylesheet" href="styles.css?v=login-gate-20260605" />
    <script src="app.js?v=login-gate-20260605" defer></script>
    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js" defer onload="window.lucide && window.lucide.createIcons()"></script>
    <style id="loginGateStyles">
      .login-screen {
        display: grid;
        place-items: center;
        min-height: 100vh;
        padding: 24px;
        background: #172026;
      }

      .login-card {
        display: grid;
        gap: 20px;
        width: min(420px, 100%);
        padding: 22px;
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: var(--radius, 8px);
        background: #ffffff;
        box-shadow: var(--shadow, 0 18px 50px rgba(24, 34, 45, 0.12));
      }

      .login-brand h1 {
        margin: 0;
        font-size: 1.45rem;
        line-height: 1.15;
      }

      .login-form {
        display: grid;
        gap: 13px;
      }

      .login-form label {
        display: grid;
        gap: 7px;
        color: #43505a;
        font-size: 0.84rem;
        font-weight: 800;
      }

      .login-form input {
        width: 100%;
        min-height: 44px;
        padding: 0 10px;
        border: 1px solid var(--line, #dce3e7);
        border-radius: var(--radius, 8px);
        background: var(--surface, #ffffff);
        color: var(--text, #1d252c);
        outline: 0;
      }

      .login-form input:focus {
        border-color: rgba(20, 125, 119, 0.72);
        box-shadow: 0 0 0 3px rgba(20, 125, 119, 0.12);
      }

      .login-form input[aria-invalid="true"] {
        border-color: var(--coral, #d95f54);
        box-shadow: 0 0 0 3px rgba(217, 95, 84, 0.14);
      }

      .logout-button {
        display: inline-flex;
        align-items: center;
        justify-content: flex-start;
        gap: 8px;
        width: 100%;
        min-height: 40px;
        margin-top: auto;
        padding: 0 12px;
        border: 1px solid rgba(255, 255, 255, 0.12);
        border-radius: var(--radius, 8px);
        background: rgba(255, 255, 255, 0.06);
        color: #d8e5e5;
        cursor: pointer;
        font-weight: 800;
      }

      .logout-button:hover {
        background: rgba(255, 255, 255, 0.11);
      }

      .logout-button svg {
        width: 18px;
        height: 18px;
        flex: 0 0 18px;
      }

      @media (max-width: 860px) {
        .logout-button {
          margin-top: 0;
          justify-content: center;
        }
      }
    </style>
  </head>
  <body>
    <section class="login-screen" id="loginScreen" aria-label="เข้าสู่ระบบ">
      <div class="login-card">
        <div class="brand login-brand">
          <div class="brand-mark">CP</div>
          <div>
            <p class="eyebrow">Content Planner</p>
            <h1>เข้าสู่ระบบ</h1>
          </div>
        </div>

        <form class="login-form" id="loginForm" novalidate>
          <label>
            User
            <input id="loginUsernameInput" name="username" type="text" autocomplete="username" placeholder="user" required />
          </label>
          <label>
            Password
            <input id="loginPasswordInput" name="password" type="password" autocomplete="current-password" placeholder="password" required />
          </label>
          <button class="primary-action full" type="submit">
            <i data-lucide="log-in" aria-hidden="true"></i>
            <span>เข้าสู่ระบบ</span>
          </button>
        </form>
      </div>
    </section>

    <section class="category-screen" id="categoryScreen" aria-label="เลือกหมวดธุรกิจ" hidden>
      <div class="category-layout">
        <div class="category-hero">
          <div class="brand category-brand">
            <div class="brand-mark">CP</div>
            <div>
              <p class="eyebrow">Content Planner</p>
              <h1>เลือกหมวดธุรกิจ</h1>
            </div>
          </div>
        </div>

        <div class="category-panel">
          <div class="panel-head compact">
            <div>
              <p class="eyebrow">Business category</p>
              <h2>เข้าใช้งานหมวด</h2>
            </div>
          </div>

          <div class="category-grid" id="categoryGrid">
            <button class="category-card" type="button" data-category-id="real-estate" onclick="return selectCategory('real-estate')">
              <span class="category-icon"><i data-lucide="building-2" aria-hidden="true"></i></span>
              <span>
                <strong>อสังหา</strong>
                <span>0 รายการคอนเทนต์</span>
              </span>
            </button>
            <button class="category-card" type="button" data-category-id="solar" onclick="return selectCategory('solar')">
              <span class="category-icon"><i data-lucide="sun" aria-hidden="true"></i></span>
              <span>
                <strong>โซลาร์เซลล์</strong>
                <span>0 รายการคอนเทนต์</span>
              </span>
            </button>
            <button class="category-card" type="button" data-category-id="restaurant" onclick="return selectCategory('restaurant')">
              <span class="category-icon"><i data-lucide="utensils" aria-hidden="true"></i></span>
              <span>
                <strong>ร้านอาหาร</strong>
                <span>0 รายการคอนเทนต์</span>
              </span>
            </button>
          </div>

          <form class="category-form" id="categoryForm" novalidate>
            <label for="categoryNameInput">เพิ่มหมวดใหม่</label>
            <div class="category-add-row">
              <input id="categoryNameInput" type="text" maxlength="40" placeholder="เช่น คลินิก, ฟิตเนส, โรงแรม" />
              <button class="primary-action" type="submit">
                <i data-lucide="plus" aria-hidden="true"></i>
                <span>เพิ่ม</span>
              </button>
            </div>
          </form>
        </div>
      </div>
    </section>

    <div class="app-shell" id="appShell" hidden>
      <aside class="sidebar" aria-label="เมนูหลัก">
        <div class="brand">
          <div class="brand-mark">CP</div>
          <div>
            <p class="eyebrow">Workspace</p>
            <h1>Content Planner</h1>
          </div>
        </div>

        <button class="category-switch" type="button" id="changeCategoryButton">
          <i data-lucide="layers-3" aria-hidden="true"></i>
          <span id="activeCategoryName">เลือกหมวด</span>
          <i data-lucide="chevron-right" aria-hidden="true"></i>
        </button>

        <nav class="nav-list" aria-label="มุมมอง">
          <button class="nav-item is-active" type="button" data-view="ideas" aria-pressed="true" onclick="return switchView('ideas')">
            <i data-lucide="lightbulb" aria-hidden="true"></i>
            <span>ไอเดีย</span>
          </button>
          <button class="nav-item" type="button" data-view="calendar" aria-pressed="false" onclick="return switchView('calendar')">
            <i data-lucide="calendar-days" aria-hidden="true"></i>
            <span>ตารางโพสต์</span>
          </button>
          <button class="nav-item" type="button" data-view="list" aria-pressed="false" onclick="return switchView('list')">
            <i data-lucide="list-checks" aria-hidden="true"></i>
            <span>รายการโพสต์</span>
          </button>
        </nav>

        <div class="sidebar-block">
          <p class="block-label">ช่องทาง</p>
          <div class="channel-stack" id="channelStack"></div>
        </div>

        <button class="logout-button" type="button" id="logoutButton">
          <i data-lucide="log-out" aria-hidden="true"></i>
          <span>ออกจากระบบ</span>
        </button>
      </aside>

      <main class="workspace">
        <header class="topbar">
          <div>
            <p class="eyebrow" id="activeCategoryEyebrow">แผนเดือนนี้</p>
            <h2 id="pageTitle">คลังไอเดีย</h2>
          </div>
          <div class="top-actions">
            <button class="secondary-action" type="button" id="topChangeCategoryButton">
              <i data-lucide="shuffle" aria-hidden="true"></i>
              <span>เปลี่ยนหมวด</span>
            </button>
            <button class="primary-action" type="button" id="focusFormButton">
              <i data-lucide="plus" aria-hidden="true"></i>
              <span>เพิ่มไอเดีย</span>
            </button>
          </div>
        </header>

        <section class="insights" aria-label="สรุปแผนคอนเทนต์">
          <article class="metric">
            <span class="metric-label">ทั้งหมด</span>
            <strong id="totalMetric">0</strong>
          </article>
          <article class="metric">
            <span class="metric-label">ไอเดีย</span>
            <strong id="ideaMetric">0</strong>
          </article>
          <article class="metric accent">
            <span class="metric-label">พร้อมโพสต์</span>
            <strong id="publishedMetric">0</strong>
          </article>
        </section>

        <section class="control-row" aria-label="ตัวกรอง">
          <label class="search-field" for="searchInput">
            <i data-lucide="search" aria-hidden="true"></i>
            <input id="searchInput" type="search" placeholder="ค้นหาชื่อ ช่องทาง รูปแบบ หรือ URL" autocomplete="off" />
          </label>

          <div class="select-group">
            <label for="channelFilter">ช่องทาง</label>
            <select id="channelFilter">
              <option value="all">ทั้งหมด</option>
            </select>
          </div>

          <div class="select-group">
            <label for="statusFilter">สถานะ</label>
            <select id="statusFilter">
              <option value="all">ทั้งหมด</option>
            </select>
          </div>
        </section>

        <div class="content-grid">
          <section class="planner-panel" aria-live="polite">
            <div class="panel-head">
              <div>
                <p class="eyebrow" id="panelEyebrow">Idea backlog</p>
                <h3 id="panelTitle">รายการไอเดียที่ยังไม่ได้ลงตาราง</h3>
              </div>
              <div class="month-switcher" id="monthSwitcher">
                <button class="icon-button" type="button" id="previousMonth" aria-label="เดือนก่อนหน้า">
                  <i data-lucide="chevron-left" aria-hidden="true"></i>
                </button>
                <span id="monthLabel"></span>
                <button class="icon-button" type="button" id="nextMonth" aria-label="เดือนถัดไป">
                  <i data-lucide="chevron-right" aria-hidden="true"></i>
                </button>
              </div>
            </div>

            <div id="ideasView" class="ideas-view"></div>
            <div id="calendarView" class="calendar-view" hidden></div>
            <div id="listView" class="list-view" hidden></div>
          </section>

          <aside class="form-panel" aria-label="ฟอร์มคอนเทนต์">
            <div class="panel-head compact">
              <div>
                <p class="eyebrow">Content brief</p>
                <h3 id="formTitle">เพิ่มไอเดียใหม่</h3>
              </div>
              <button class="icon-button subtle" type="button" id="resetFormButton" aria-label="ล้างฟอร์ม">
                <i data-lucide="rotate-ccw" aria-hidden="true"></i>
              </button>
            </div>

            <form id="contentForm" class="content-form" novalidate>
              <label>
                ชื่อคอนเทนต์
                <input id="titleInput" name="title" type="text" required maxlength="80" placeholder="เช่น Reel เปิดตัวโปรโมชัน" />
              </label>

              <label class="url-field">
                แนบลิงก์ URL
                <textarea id="urlInput" name="url" rows="3" inputmode="url" maxlength="800" placeholder="https://example.com/content-brief&#10;https://example.com/reference"></textarea>
                <span class="field-help">วางหลายลิงก์ได้ทีละบรรทัด แล้วกดปุ่มด้านล่างเพื่อเปิดแท็บใหม่</span>
              </label>
              <div class="url-preview" id="urlPreview" aria-live="polite"></div>

              <div class="field-pair schedule-fields" id="scheduleFields" hidden>
                <label>
                  วันที่
                  <input id="dateInput" name="date" type="date" />
                </label>
                <label>
                  เวลา
                  <input id="timeInput" name="time" type="time" />
                </label>
              </div>

              <div class="field-pair">
                <label>
                  ช่องทาง
                  <select id="channelInput" name="channel" required></select>
                </label>
                <label>
                  รูปแบบ
                  <select id="formatInput" name="format" required>
                    <option>Post</option>
                    <option>Story</option>
                    <option>Reel</option>
                    <option>Carousel</option>
                    <option>Video</option>
                    <option>Article</option>
                    <option>Email</option>
                  </select>
                </label>
              </div>

              <label>
                สถานะ
                <select id="statusInput" name="status" required></select>
              </label>

              <label>
                โน้ต
                <textarea id="notesInput" name="notes" rows="4" placeholder="ประเด็นหลักหรือสิ่งที่ต้องเตรียม"></textarea>
              </label>

              <button class="primary-action full" type="submit" id="submitButton">
                <i data-lucide="save" aria-hidden="true"></i>
                <span>บันทึกไอเดีย</span>
              </button>
            </form>
          </aside>
        </div>
      </main>
    </div>
    <div class="toast" id="toast" role="status" aria-live="polite" hidden></div>
    <script>
      (() => {
        const authStorageKey = "simple-content-planner-auth";
        const credentials = { username: "ohjay", password: "ohjay" };
        let toastTimer;

        function ready() {
          if (window.__contentPlannerNativeAuth) return;

          const loginScreen = document.querySelector("#loginScreen");
          const loginForm = document.querySelector("#loginForm");
          const usernameInput = document.querySelector("#loginUsernameInput");
          const passwordInput = document.querySelector("#loginPasswordInput");
          const categoryScreen = document.querySelector("#categoryScreen");
          const appShell = document.querySelector("#appShell");
          const logoutButton = document.querySelector("#logoutButton");
          const toast = document.querySelector("#toast");

          if (!loginScreen || !loginForm || !usernameInput || !passwordInput || !categoryScreen || !appShell) return;

          function showToast(message, type = "success") {
            if (!toast) return;
            window.clearTimeout(toastTimer);
            toast.textContent = message;
            toast.dataset.type = type;
            toast.hidden = false;
            toastTimer = window.setTimeout(() => {
              toast.hidden = true;
            }, 3000);
          }

          function isAuthenticated() {
            try {
              return window.localStorage?.getItem(authStorageKey) === credentials.username;
            } catch {
              return false;
            }
          }

          function setAuthenticated() {
            try {
              window.localStorage?.setItem(authStorageKey, credentials.username);
            } catch {
              showToast("เบราว์เซอร์นี้อาจไม่จำสถานะล็อกอิน", "warning");
            }
          }

          function clearAuthenticated() {
            try {
              window.localStorage?.removeItem(authStorageKey);
            } catch {
              return;
            }
          }

          function clearInvalidState() {
            usernameInput.removeAttribute("aria-invalid");
            passwordInput.removeAttribute("aria-invalid");
          }

          function showLogin() {
            loginScreen.hidden = false;
            categoryScreen.hidden = true;
            appShell.hidden = true;
            loginForm.reset();
            clearInvalidState();
            window.requestAnimationFrame(() => usernameInput.focus({ preventScroll: true }));
          }

          function showCategory() {
            loginScreen.hidden = true;
            appShell.hidden = true;
            categoryScreen.hidden = false;
            if (typeof window.showCategoryScreen === "function") {
              window.showCategoryScreen();
            }
            if (window.lucide) {
              window.lucide.createIcons();
            }
          }

          loginForm.addEventListener("submit", (event) => {
            event.preventDefault();
            const isValid = usernameInput.value.trim() === credentials.username && passwordInput.value === credentials.password;

            if (!isValid) {
              usernameInput.setAttribute("aria-invalid", "true");
              passwordInput.setAttribute("aria-invalid", "true");
              usernameInput.focus();
              showToast("User หรือ Password ไม่ถูกต้อง", "warning");
              return;
            }

            setAuthenticated();
            clearInvalidState();
            showCategory();
            showToast("เข้าสู่ระบบแล้ว");
          });

          usernameInput.addEventListener("input", clearInvalidState);
          passwordInput.addEventListener("input", clearInvalidState);
          logoutButton?.addEventListener("click", () => {
            clearAuthenticated();
            showLogin();
            showToast("ออกจากระบบแล้ว");
          });

          document.querySelector("#focusFormButton")?.addEventListener("click", () => {
            document.querySelector("#resetFormButton")?.click();
            document.querySelector(".form-panel")?.scrollIntoView({ behavior: "smooth", block: "start" });
            document.querySelector("#titleInput")?.focus({ preventScroll: true });
          });

          if (isAuthenticated()) {
            showCategory();
          } else {
            showLogin();
          }
        }

        if (document.readyState === "loading") {
          document.addEventListener("DOMContentLoaded", ready);
        } else {
          ready();
        }
      })();
    </script>
  </body>
</html>
